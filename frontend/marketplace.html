<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Marktplatz - MySaskia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

<link rel="stylesheet" href="css/shop-nav.css?v=1">
    <link rel="stylesheet" href="css/style.css?v=8">
    <link rel="stylesheet" href="css/marketplace.css?v=4">
</head>
<body data-page="marketplace">
    <nav class="navbar">
        <a class="nav-brand" href="index.html">
            <img src="images/flower-logo.svg" alt="MySaskia Logo">
            <span>MySaskia</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="marketplace.html">Marktplatz</a>
            <a href="sell.html">Tier verkaufen</a>
            <a href="my-items.html">Meine Inserate</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="support.html">Support</a>
            <a href="profile.html">Profil</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <main>
        <section class="marketplace-hero">
            <h1>Tier-Marktplatz</h1>
            <p>Entdecke Tiere, die ein neues Zuhause suchen. MySaskia verbindet Verkäufer und Käufer auf einer einfachen lokalen Plattform.</p>

            <div class="marketplace-actions">
                <a class="btn" href="sell.html">Tier verkaufen</a>
                <a class="btn secondary" href="my-items.html">Meine Inserate</a>
            </div>
        </section>

        <section class="marketplace-container">
            <h2>Aktive Tier-Inserate</h2>

            <form id="marketplaceFilters" class="marketplace-filters">
                <div class="marketplace-filter-fields">
                    <div class="marketplace-filter-field marketplace-filter-search">
                        <label for="filterQuery">Suche</label>
                        <input id="filterQuery" name="q" type="search" placeholder="Titel, Rasse, Beschreibung...">
                    </div>

                    <div class="marketplace-filter-field">
                        <label for="filterSpecies">Tierart/Kategorie</label>
                        <select id="filterSpecies" name="species">
                            <option value="">Alle</option>
                            <option value="Hund">Hund</option>
                            <option value="Katze">Katze</option>
                            <option value="Kaninchen">Kaninchen</option>
                            <option value="Vogel">Vogel</option>
                            <option value="Hamster">Hamster</option>
                            <option value="Meerschweinchen">Meerschweinchen</option>
                            <option value="Schildkröte">Schildkröte</option>
                        </select>
                    </div>

                    <div class="marketplace-filter-field">
                        <label for="filterMaxPrice">Preis bis</label>
                        <input id="filterMaxPrice" name="maxPrice" type="number" min="0" step="0.01" placeholder="500">
                    </div>
                </div>

                <div class="marketplace-filter-actions">
                    <button class="btn" type="submit">Filter anwenden</button>
                    <button id="resetMarketplaceFilters" class="btn secondary" type="button">Zurücksetzen</button>
                </div>
            </form>

            <div id="itemsGrid" class="item-grid"></div>
        </section>
    </main>

    <script src="js/i18n.js?v=1"></script>
    <script src="js/site.js?v=1"></script>
<script src="js/shop-nav.js?v=2"></script>
    <script src="js/items.js?v=3"></script>
</body>
</html>
