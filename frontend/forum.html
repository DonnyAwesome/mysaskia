<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Tiergeschichten - MySaskia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/shop-nav.css?v=1">
    <link rel="stylesheet" href="css/style.css?v=9">
    <link rel="stylesheet" href="css/marketplace.css?v=7">
    <link rel="stylesheet" href="css/forum.css?v=2">
</head>
<body data-page="forum">
    <nav class="navbar">
        <a class="nav-brand" href="index.html">
            <img src="images/flower-logo.svg" alt="MySaskia Logo">
            <span>MySaskia</span>
        </a>
    </nav>

    <main>
        <section class="marketplace-hero forum-hero">
            <h1>Tiergeschichten</h1>
            <p>Erstelle Gruppen, tritt Rollenspielen bei und schreibe gemeinsam Geschichten aus Sicht deiner Tiere.</p>
        </section>

        <section class="marketplace-container">
            <h2>Neue Gruppe erstellen</h2>
            <div id="forumCreateGroup"></div>
        </section>

        <section class="marketplace-container">
            <h2>Gruppen entdecken</h2>
            <div id="forumGroups" class="forum-group-grid"></div>
        </section>

        <section class="marketplace-container">
            <h2>Aktuelle Geschichten</h2>
            <div id="forumFeed" class="forum-feed"></div>
        </section>
    </main>

    <script src="js/i18n.js?v=1"></script>
    <script src="js/site.js?v=1"></script>
    <script src="js/shop-nav.js?v=5"></script>
    <script src="js/forum.js?v=2"></script>
</body>
</html>
