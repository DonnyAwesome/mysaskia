<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Tiergeschichten-Gruppe - MySaskia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/shop-nav.css?v=1">
    <link rel="stylesheet" href="css/style.css?v=9">
    <link rel="stylesheet" href="css/marketplace.css?v=7">
    <link rel="stylesheet" href="css/forum.css?v=3">
</head>
<body data-page="forum-group">
    <nav class="navbar">
        <a class="nav-brand" href="index.html">
            <img src="images/flower-logo.svg" alt="MySaskia Logo">
            <span>MySaskia</span>
        </a>
    </nav>

    <main>
        <section id="forumGroupDetails" class="marketplace-hero forum-hero">
            <h1>Tiergeschichten-Gruppe</h1>
            <p>Gruppe wird geladen...</p>
        </section>

        <section class="marketplace-container">
            <h2>Neue Geschichte starten</h2>
            <div id="forumStoryForm"></div>
        </section>

        <section class="marketplace-container">
            <h2>Geschichten</h2>
            <div id="forumGroupStories" class="forum-story-grid"></div>
        </section>

        <section class="marketplace-container">
            <h2>Allgemeinen Beitrag schreiben</h2>
            <div id="forumPostForm"></div>
        </section>

        <section class="marketplace-container">
            <h2>Allgemeine Beiträge</h2>
            <div id="forumGroupPosts" class="forum-feed"></div>
        </section>
    </main>

    <script src="js/i18n.js?v=1"></script>
    <script src="js/site.js?v=1"></script>
    <script src="js/shop-nav.js?v=6"></script>
    <script src="js/forum-group.js?v=3"></script>
</body>
</html>
