<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f9a8d4"/>
            <stop offset="50%" stop-color="#ec4899"/>
            <stop offset="100%" stop-color="#be185d"/>
        </linearGradient>

        <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#86efac"/>
            <stop offset="100%" stop-color="#16a34a"/>
        </linearGradient>

        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.22"/>
        </filter>
    </defs>

    <rect width="160" height="160" rx="36" fill="#0f172a"/>

    <g filter="url(#softShadow)">
        <ellipse cx="80" cy="43" rx="20" ry="34" fill="url(#petalGradient)" transform="rotate(0 80 80)"/>
        <ellipse cx="80" cy="43" rx="20" ry="34" fill="url(#petalGradient)" transform="rotate(72 80 80)"/>
        <ellipse cx="80" cy="43" rx="20" ry="34" fill="url(#petalGradient)" transform="rotate(144 80 80)"/>
        <ellipse cx="80" cy="43" rx="20" ry="34" fill="url(#petalGradient)" transform="rotate(216 80 80)"/>
        <ellipse cx="80" cy="43" rx="20" ry="34" fill="url(#petalGradient)" transform="rotate(288 80 80)"/>

        <circle cx="80" cy="80" r="18" fill="#facc15"/>
        <circle cx="80" cy="80" r="9" fill="#f97316"/>

        <path d="M80 98 C78 118, 75 132, 68 144" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
        <path d="M75 120 C52 112, 45 96, 63 91 C78 87, 84 105, 75 120Z" fill="url(#leafGradient)"/>
        <path d="M80 126 C103 118, 112 101, 94 96 C80 92, 72 110, 80 126Z" fill="url(#leafGradient)"/>
    </g>
</svg>
