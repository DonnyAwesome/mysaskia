<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Inserat bearbeiten - MySaskia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/shop-nav.css?v=1">
    <link rel="stylesheet" href="css/style.css?v=8">
    <link rel="stylesheet" href="css/marketplace.css?v=4">
</head>
<body data-page="edit-item">
    <nav class="navbar">
        <a class="nav-brand" href="index.html">
            <img src="images/flower-logo.svg" alt="MySaskia Logo">
            <span>MySaskia</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="marketplace.html">Marktplatz</a>
            <a href="sell.html">Tier verkaufen</a>
            <a href="my-items.html">Meine Inserate</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="support.html">Support</a>
            <a href="profile.html">Profil</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <main>
        <section class="marketplace-hero">
            <h1>Inserat bearbeiten</h1>
            <p>Aktualisiere die Angaben und speichere deine Änderungen.</p>
        </section>

        <form id="editItemForm" class="sell-form">
            <label for="title">Titel</label>
            <input id="title" name="title" type="text" required>

            <label for="description">Beschreibung</label>
            <textarea id="description" name="description" rows="5"></textarea>

            <div class="form-row">
                <div>
                    <label for="species">Tierart</label>
                    <input id="species" name="species" type="text">
                </div>

                <div>
                    <label for="breed">Rasse</label>
                    <input id="breed" name="breed" type="text">
                </div>
            </div>

            <div class="form-row">
                <div>
                    <label for="age">Alter</label>
                    <input id="age" name="age" type="text">
                </div>

                <div>
                    <label for="gender">Geschlecht</label>
                    <select id="gender" name="gender">
                        <option value="">Bitte wählen</option>
                        <option value="männlich">männlich</option>
                        <option value="weiblich">weiblich</option>
                        <option value="unbekannt">unbekannt</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div>
                    <label for="price">Preis in Euro</label>
                    <input id="price" name="price" type="number" min="0" step="0.01">
                </div>

                <div>
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="aktiv">aktiv</option>
                        <option value="verkauft">verkauft</option>
                    </select>
                </div>
            </div>

            <label for="itemType">Inseratstyp</label>
            <input id="itemType" name="item_type" type="text">

            <label for="image">Neues Bild auswählen (optional)</label>
            <input id="image" name="image" type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp">

            <img id="imagePreview" class="image-preview" alt="Bildvorschau">

            <div class="item-card-actions">
                <button class="btn" type="submit">Änderungen speichern</button>
                <a class="btn secondary" href="my-items.html">Abbrechen</a>
            </div>

            <div id="editItemMessage" class="status-message"></div>
            <div id="editItemSuccessActions" class="item-card-actions"></div>
        </form>
    </main>

    <script src="js/i18n.js?v=1"></script>
    <script src="js/site.js?v=1"></script>
    <script src="js/shop-nav.js?v=3"></script>
    <script src="js/edit-item.js?v=2"></script>
</body>
</html>
