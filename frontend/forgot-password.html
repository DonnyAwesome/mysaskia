<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Passwort vergessen - MySaskia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css?v=9">
    <link rel="stylesheet" href="css/shop-nav.css?v=1">
</head>
<body data-page="forgot-password">
    <nav class="navbar simple">
        <div class="logo brand-logo">
            <img src="images/flower-logo.svg" alt="MySaskia Logo">
            <span>MySaskia</span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="marketplace.html">Marktplatz</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main class="login-page">
        <section class="login-brand-card">
            <img class="login-logo-image" src="images/flower-logo.svg" alt="MySaskia Logo">
            <h1>Passwort zurücksetzen</h1>
            <p>Fordere einen lokalen Reset-Link für deinen MySaskia-Account an.</p>
        </section>

        <section class="card login-card">
            <div class="login-card-header">
                <div>
                    <h2>Reset-Link anfordern</h2>
                    <p>Lokaler Lernmodus: Der Reset-Link wird direkt angezeigt.</p>
                </div>
            </div>

            <form id="forgotPasswordForm">
                <label for="resetEmail">E-Mail</label>
                <input id="resetEmail" name="email" type="email" autocomplete="email" required>

                <button id="requestResetButton" type="submit">Reset-Link anfordern</button>
            </form>

            <div id="forgotPasswordMessage" class="auth-message hidden" role="status"></div>

            <div class="login-links">
                <p><a href="login.html">Zurück zum Login</a></p>
            </div>
        </section>
    </main>

    <script src="js/site.js?v=1"></script>
    <script src="js/shop-nav.js?v=3"></script>
    <script src="js/forgot-password.js?v=1"></script>
</body>
</html>
