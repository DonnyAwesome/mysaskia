<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neues Passwort setzen - MySaskia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css?v=9">
    <link rel="stylesheet" href="css/shop-nav.css?v=1">
</head>
<body data-page="reset-password">
    <nav class="navbar simple">
        <div class="logo brand-logo">
            <img src="images/flower-logo.svg" alt="MySaskia Logo">
            <span>MySaskia</span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="marketplace.html">Marktplatz</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main class="login-page">
        <section class="login-brand-card">
            <img class="login-logo-image" src="images/flower-logo.svg" alt="MySaskia Logo">
            <h1>Neues Passwort</h1>
            <p>Setze mit deinem lokalen Reset-Token ein neues Passwort.</p>
        </section>

        <section class="card login-card">
            <div class="login-card-header">
                <div>
                    <h2>Passwort ändern</h2>
                    <p>Der Reset-Token ist 30 Minuten gültig und kann einmal verwendet werden.</p>
                </div>
            </div>

            <form id="resetPasswordForm">
                <label for="resetToken">Reset-Token</label>
                <input id="resetToken" name="token" type="text" autocomplete="off" required>

                <label for="newPassword">Neues Passwort</label>
                <input id="newPassword" name="new_password" type="password" minlength="6" autocomplete="new-password" required>

                <label for="confirmPassword">Passwort bestätigen</label>
                <input id="confirmPassword" name="confirm_password" type="password" minlength="6" autocomplete="new-password" required>

                <button id="confirmResetButton" type="submit">Neues Passwort speichern</button>
            </form>

            <div id="resetPasswordMessage" class="auth-message hidden" role="status"></div>

            <div class="login-links">
                <p><a href="login.html">Zurück zum Login</a></p>
            </div>
        </section>
    </main>

    <script src="js/site.js?v=1"></script>
    <script src="js/shop-nav.js?v=3"></script>
    <script src="js/reset-password.js?v=1"></script>
</body>
</html>
